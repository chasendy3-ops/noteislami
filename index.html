<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Note App · Islamic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #13203a 0%, #05070c 90%);
            font-family: 'Scheherazade New', 'Inter', 'Segoe UI', serif;
            color: #eef5ff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
        }
        .glass-card {
            background: rgba(8, 14, 30, 0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(30, 100, 255, 0.25);
            border-radius: 40px;
            padding: 32px 28px;
            box-shadow: 0 20px 50px rgba(0, 20, 80, 0.7), 0 0 30px rgba(20, 80, 255, 0.15);
            transition: all 0.25s ease;
        }
        .neon-glow {
            box-shadow: 0 0 20px #0a3b9e, 0 0 60px #06206b, 0 0 100px #03123d;
        }
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(40, 120, 255, 0.25);
            padding-bottom: 20px;
        }
        .app-title {
            font-family: 'Scheherazade New', serif;
            font-weight: 700;
            font-size: 2.6rem;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #b3d9ff, #7bb3ff, #3d7eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 18px #1a5fd0, 0 0 40px #0b3a9a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .app-title small {
            font-size: 1rem;
            background: rgba(0, 40, 120, 0.5);
            padding: 4px 18px;
            border-radius: 60px;
            border: 1px solid #2d7aff;
            color: #b8d6ff;
            text-shadow: 0 0 8px #0055ff;
            font-weight: 400;
            letter-spacing: 1px;
            backdrop-filter: blur(2px);
            -webkit-text-fill-color: #cadeff;
        }
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin: 28px 0 20px;
        }
        .note-item {
            background: rgba(6, 14, 34, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(50, 130, 255, 0.3);
            border-radius: 32px;
            padding: 22px 20px;
            transition: 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            position: relative;
        }
        .note-item:hover {
            transform: translateY(-8px);
            border-color: #5f9eff;
            box-shadow: 0 0 30px #1a6aff66, 0 0 70px #0a3b9e55;
            background: rgba(10, 22, 50, 0.8);
        }
        .note-title {
            font-family: 'Scheherazade New', serif;
            font-weight: 700;
            font-size: 1.6rem;
            color: #e2efff;
            text-shadow: 0 0 12px #1a5fd0;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .note-preview {
            color: #b8cef0;
            font-size: 1rem;
            line-height: 1.5;
            opacity: 0.9;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            margin-bottom: 16px;
        }
        .note-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #8cb0e6;
            border-top: 1px dashed rgba(60, 140, 255, 0.2);
            padding-top: 14px;
        }
        .btn-delete-mini {
            background: rgba(255, 40, 70, 0.15);
            border: 1px solid #ff4d6d;
            color: #ff8a9e;
            padding: 4px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.2s;
            backdrop-filter: blur(2px);
        }
        .btn-delete-mini:hover {
            background: #b01030;
            color: white;
            box-shadow: 0 0 25px #ff2a4a;
            border-color: #ff1a3a;
        }
        .fab-neon {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #0a2b6b;
            border: 1.5px solid #3d8aff;
            color: white;
            font-size: 2.8rem;
            font-weight: 300;
            box-shadow: 0 0 30px #0055ffaa, 0 0 80px #0033aa66;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            z-index: 999;
        }
        .fab-neon:hover {
            transform: scale(1.08) rotate(4deg);
            background: #1248a0;
            box-shadow: 0 0 60px #1a6aff, 0 0 120px #0044dd;
            border-color: #9ac2ff;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #b0caf5;
        }
        .empty-state h3 {
            font-size: 2rem;
            font-family: 'Scheherazade New', serif;
            text-shadow: 0 0 20px #1a5fd0;
        }
        .btn-outline-neon {
            background: transparent;
            border: 1.5px solid #2a7aff;
            color: #bfd9ff;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: 0.25s;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 12px rgba(30, 100, 255, 0.2);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .btn-outline-neon:hover {
            background: #1a4b9e;
            border-color: #7bb3ff;
            box-shadow: 0 0 30px #1a6aff, 0 0 60px #0a3b9e;
            color: white;
            transform: scale(1.02);
        }
        @media (max-width: 700px) {
            .glass-card {
                padding: 20px 14px;
            }
            .app-title {
                font-size: 2rem;
            }
            .fab-neon {
                width: 60px;
                height: 60px;
                font-size: 2.2rem;
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card neon-glow">
            <div class="app-header">
                <div class="app-title">
                    📖 Note App <small>islamic</small>
                </div>
                <span style="color:#8ab3f0;font-size:0.9rem;">🕌 sholawat & doa</span>
            </div>
            <div class="notes-grid" id="notesGrid">
                <!-- Akan diisi JS -->
            </div>
            <div style="text-align:center;margin-top:8px;color:#5789d0;font-size:0.8rem;" id="noteCount">0 catatan tersimpan</div>
        </div>
        <button class="fab-neon" id="fabAddBtn">+</button>
    </div>

    <script>
        const STORAGE_KEY = 'islamic_notes';

        function loadNotes() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch { return []; }
        }

        function saveNotes(notes) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
        }

        function getToday() {
            return new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function renderNotes() {
            const notes = loadNotes();
            const grid = document.getElementById('notesGrid');
            const count = document.getElementById('noteCount');

            if (notes.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <h3>📖 belum ada catatan</h3>
                        <p style="margin-top:10px;">sentuh tombol + untuk menulis sholawat & doa</p>
                    </div>
                `;
                count.textContent = '0 catatan tersimpan';
                return;
            }

            grid.innerHTML = notes.map(n => `
                <div class="note-item" data-id="${n.id}">
                    <div class="note-title">${escapeHtml(n.title || 'Tanpa judul')}</div>
                    <div class="note-preview">${escapeHtml((n.content || '').substring(0, 120))}${(n.content || '').length > 120 ? '…' : ''}</div>
                    <div class="note-meta">
                        <span>📅 ${n.date || getToday()}</span>
                        <button class="btn-delete-mini" data-id="${n.id}">hapus</button>
                    </div>
                </div>
            `).join('');

            count.textContent = `${notes.length} catatan tersimpan`;

            // Event buka catatan
            document.querySelectorAll('.note-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.btn-delete-mini')) return;
                    const id = el.dataset.id;
                    window.location.href = `note.html?id=${id}`;
                });
            });

            // Event hapus
            document.querySelectorAll('.btn-delete-mini').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    if (confirm('Hapus catatan ini?')) {
                        let notes = loadNotes();
                        notes = notes.filter(n => n.id !== id);
                        saveNotes(notes);
                        renderNotes();
                    }
                });
            });
        }

        document.getElementById('fabAddBtn').addEventListener('click', () => {
            window.location.href = 'create.html';
        });

        renderNotes();
    </script>
</body>
</html>
