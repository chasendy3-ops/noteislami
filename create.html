<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tambah Catatan - NOTE ISLAMIC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdef5 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #1565c0;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .back-btn:hover {
            color: #0d47a1;
        }

        h2 {
            color: #1565c0;
            margin-bottom: 25px;
            font-size: 28px;
            border-bottom: 3px solid #1565c0;
            padding-bottom: 10px;
            display: inline-block;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #0d47a1;
            margin-bottom: 8px;
            font-size: 16px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #1565c0;
        }

        textarea {
            min-height: 200px;
            resize: vertical;
        }

        .btn-save {
            background: #1565c0;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-save:hover {
            background: #0d47a1;
        }

        @media (max-width: 768px) {
            .card {
                padding: 20px;
            }
            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <button class="back-btn" onclick="window.location.href='index.html'">← Kembali</button>
            <h2>➕ Tambah Catatan Sholawat</h2>
            
            <div class="form-group">
                <label>📌 Judul Sholawat/Catatan</label>
                <input type="text" id="judul" placeholder="Contoh: Sholawat Badar, Sholawat Nariyah, dll." autocomplete="off">
            </div>

            <div class="form-group">
                <label>📝 Tulis Catatan</label>
                <textarea id="isiCatatan" placeholder="Tulis lirik sholawat, makna, atau catatan harian sholawat di sini..."></textarea>
            </div>

            <button class="btn-save" id="simpanBtn">💾 SIMPAN</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'islamic_notes';

        function loadNotes() {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        function saveNotes(notes) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
        }

        function getCurrentDate() {
            const now = new Date();
            return now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        document.getElementById('simpanBtn').addEventListener('click', () => {
            const judul = document.getElementById('judul').value.trim();
            const isi = document.getElementById('isiCatatan').value.trim();

            if (!isi) {
                alert('⚠️ Catatan tidak boleh kosong!');
                return;
            }

            let notes = loadNotes();
            
            const newNote = {
                id: Date.now(),
                title: judul || 'Catatan Sholawat',
                content: isi,
                date: getCurrentDate(),
                createdAt: new Date().toISOString()
            };

            notes.unshift(newNote); // Tambah di awal
            saveNotes(notes);

            alert('✅ Catatan berhasil disimpan!');
            window.location.href = 'index.html';
        });

        // Enter untuk submit? Biarkan manual
        document.getElementById('isiCatatan').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                document.getElementById('simpanBtn').click();
            }
        });
    </script>
</body>
</html>
