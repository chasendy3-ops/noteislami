<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Catatan - NOTE ISLAMIC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdef5 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #1565c0;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }
        h2 {
            color: #1565c0;
            margin-bottom: 25px;
            border-bottom: 3px solid #1565c0;
            padding-bottom: 10px;
            display: inline-block;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-weight: bold;
            color: #0d47a1;
            margin-bottom: 8px;
        }
        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #1565c0;
        }
        textarea {
            min-height: 200px;
            resize: vertical;
        }
        .btn-update {
            background: #1565c0;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .btn-update:hover {
            background: #0d47a1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <button class="back-btn" onclick="window.location.href='index.html'">← Kembali</button>
            <h2>✏️ Edit Catatan Sholawat</h2>
            
            <div class="form-group">
                <label>📌 Judul Sholawat/Catatan</label>
                <input type="text" id="editJudul" placeholder="Contoh: Sholawat Badar">
            </div>

            <div class="form-group">
                <label>📝 Isi Catatan</label>
                <textarea id="editIsi" placeholder="Tulis lirik sholawat..."></textarea>
            </div>

            <button class="btn-update" id="updateBtn">💾 UPDATE CATATAN</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'islamic_notes';
        
        function loadNotes() {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : [];
        }
        
        function saveNotes(notes) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
        }
        
        function getNoteIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return parseInt(params.get('id'));
        }
        
        function loadNoteForEdit() {
            const noteId = getNoteIdFromUrl();
            const notes = loadNotes();
            const note = notes.find(n => n.id === noteId);
            
            if (note) {
                document.getElementById('editJudul').value = note.title || '';
                document.getElementById('editIsi').value = note.content || '';
            } else {
                alert('Catatan tidak ditemukan!');
                window.location.href = 'index.html';
            }
            
            document.getElementById('updateBtn').addEventListener('click', () => {
                const newTitle = document.getElementById('editJudul').value.trim();
                const newContent = document.getElementById('editIsi').value.trim();
                
                if (!newContent) {
                    alert('Isi catatan tidak boleh kosong!');
                    return;
                }
                
                let updatedNotes = loadNotes();
                const index = updatedNotes.findIndex(n => n.id === noteId);
                if (index !== -1) {
                    updatedNotes[index] = {
                        ...updatedNotes[index],
                        title: newTitle || 'Catatan Sholawat',
                        content: newContent,
                        date: new Date().toLocaleDateString('id-ID'),
                        updatedAt: new Date().toISOString()
                    };
                    saveNotes(updatedNotes);
                    alert('✅ Catatan berhasil diperbarui!');
                    window.location.href = `note.html?id=${noteId}`;
                }
            });
        }
        
        loadNoteForEdit();
    </script>
</body>
</html>
