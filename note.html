<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Baca Catatan · Note Islamic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #13203a 0%, #05070c 90%);
            font-family: 'Scheherazade New', 'Inter', 'Segoe UI', serif;
            color: #eef5ff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }
        .glass-card {
            background: rgba(8, 14, 30, 0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(30, 100, 255, 0.25);
            border-radius: 40px;
            padding: 32px 28px;
            box-shadow: 0 20px 50px rgba(0, 20, 80, 0.7), 0 0 30px rgba(20, 80, 255, 0.15);
        }
        .neon-glow {
            box-shadow: 0 0 20px #0a3b9e, 0 0 60px #06206b, 0 0 100px #03123d;
        }
        .btn-outline-neon {
            background: transparent;
            border: 1.5px solid #2a7aff;
            color: #bfd9ff;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: 0.25s;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 12px rgba(30, 100, 255, 0.2);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            margin-bottom: 24px;
        }
        .btn-outline-neon:hover {
            background: #1a4b9e;
            border-color: #7bb3ff;
            box-shadow: 0 0 30px #1a6aff, 0 0 60px #0a3b9e;
            color: white;
            transform: scale(1.02);
        }
        .note-detail-title {
            font-family: 'Scheherazade New', serif;
            font-size: 2.8rem;
            font-weight: 700;
            color: #e1efff;
            text-shadow: 0 0 25px #1a5fd0;
            border-left: 5px solid #3d86ff;
            padding-left: 24px;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .note-detail-date {
            color: #8aafec;
            margin-left: 28px;
            margin-bottom: 28px;
            font-size: 1rem;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .note-detail-body {
            background: rgba(0, 8, 28, 0.5);
            padding: 30px;
            border-radius: 40px;
            font-size: 1.2rem;
            line-height: 2;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid #1f5bbf55;
            font-family: 'Inter', sans-serif;
            color: #d7e7ff;
            box-shadow: inset 0 0 40px #00113333;
        }
        .action-row {
            display: flex;
            gap: 18px;
            justify-content: flex-end;
            margin-top: 32px;
            flex-wrap: wrap;
        }
        .btn-danger-neon {
            background: rgba(255, 40, 70, 0.15);
            border: 1.5px solid #ff4d6d;
            color: #ff8a9e;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: 0.25s;
            backdrop-filter: blur(4px);
        }
        .btn-danger-neon:hover {
            background: #b01030;
            color: white;
            box-shadow: 0 0 30px #ff2a4a;
            border-color: #ff1a3a;
        }
        @media (max-width: 700px) {
            .glass-card {
                padding: 20px 14px;
            }
            .note-detail-title {
                font-size: 2rem;
                padding-left: 16px;
            }
            .note-detail-body {
                font-size: 1rem;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card neon-glow" id="noteContainer">
            <!-- Akan diisi JS -->
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'islamic_notes';

        function loadNotes() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch { return []; }
        }

        function saveNotes(notes) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
        }

        function getNoteIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return parseInt(params.get('id'));
        }

        function escapeHtml(text) {
            if (!text) return '';
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function renderNote() {
            const id = getNoteIdFromUrl();
            const notes = loadNotes();
            const note = notes.find(n => n.id === id);
            const container = document.getElementById('noteContainer');

            if (!note) {
                container.innerHTML = `
                    <div style="text-align:center;padding:60px;">
                        <h3 style="font-family:'Scheherazade New',serif;font-size:2rem;">📭 catatan hilang</h3>
                        <button class="btn-outline-neon" onclick="window.location.href='index.html'" style="margin-top:20px;">kembali</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <button class="btn-outline-neon" id="backBtn">← Dashboard</button>
                <div class="note-detail-title">${escapeHtml(note.title)}</div>
                <div class="note-detail-date">
                    <span>📅 ${note.date || 'Tanggal tidak tersedia'}</span>
                    <span>🕌 sholawat</span>
                </div>
                <div class="note-detail-body">${escapeHtml(note.content).replace(/\n/g, '<br>')}</div>
                <div class="action-row">
                    <button class="btn-outline-neon" id="editBtn" style="border-color:#5f9eff;">✏️ Edit</button>
                    <button class="btn-danger-neon" id="deleteBtn">🗑️ Hapus</button>
                </div>
            `;

            document.getElementById('backBtn').addEventListener('click', () => {
                window.location.href = 'index.html';
            });

            document.getElementById('editBtn').addEventListener('click', () => {
                window.location.href = `edit.html?id=${id}`;
            });

            document.getElementById('deleteBtn').addEventListener('click', () => {
                if (confirm(`Hapus catatan "${note.title}"?`)) {
                    let all = loadNotes();
                    all = all.filter(n => n.id !== id);
                    saveNotes(all);
                    window.location.href = 'index.html';
                }
            });
        }

        renderNote();
    </script>
</body>
</html>
